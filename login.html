<!doctype html>
<html lang="mr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rajmudra Billing - Login</title>
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#f2f4f7;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      background:#fff;
      border:1px solid #e6e6e6;
      border-radius:14px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      padding:18px;
      width:min(360px,92vw);
    }
    h2{margin:0 0 12px 0}
    input{
      width:100%;
      box-sizing:border-box;
      border:1px solid #d7d7d7;
      border-radius:10px;
      padding:11px 12px;
      font-size:14px;
      margin:8px 0;
    }
    button{
      width:100%;
      border:0;
      border-radius:10px;
      padding:11px 12px;
      font-weight:800;
      cursor:pointer;
      background:#1f7a8c;
      color:#fff;
      margin-top:8px;
    }
    .err{
      color:#b00020;
      font-size:13px;
      min-height:18px;
      margin-top:6px;
    }
    .pill{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      background:#eef6f8;
      color:#0b3c5d;
      font-size:11px;
      font-weight:900;
    }
  </style>
</head>
<body>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <h2>Login</h2>
      <span class="pill">Rajmudra</span>
    </div>

    <div class="err" id="err"></div>

    <input id="u" placeholder="Username" autocomplete="username" />
    <input id="p" placeholder="Password" type="password" autocomplete="current-password" />

    <button onclick="doLogin()">Login</button>
  </div>

<script>
  const USERS = {
    admin: "1234",
    client1: "1234",
    client2: "1234",
    client3: "1234"
  };

  function doLogin(){
    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value;
    const err = document.getElementById("err");
    err.textContent = "";

    if(!u || !p){
      err.textContent = "Username आणि Password टाका.";
      return;
    }
    if(USERS[u] !== p){
      err.textContent = "चुकीचा Username/Password.";
      return;
    }

    localStorage.setItem("rm_logged_in", "true");
    localStorage.setItem("rm_user", u);
    window.location.href = "index.html";
  }

  (function(){
    if(localStorage.getItem("rm_logged_in")==="true" && localStorage.getItem("rm_user")){
      window.location.href = "index.html";
    }
  })();
</script>

</body>
</html>
